# Production — app + HTTPS proxy (database is DigitalOcean Managed PostgreSQL).
#
# On your server (after git clone):
#   cp .env.example .env    # edit DOMAIN and database URLs
#   docker compose up -d --build
#
# Or run:  bash scripts/install-production.sh

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      - uploads:/app/public/uploads
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  uploads:
  caddy_data:
  caddy_config:
