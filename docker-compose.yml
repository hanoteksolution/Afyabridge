# Production — WordPress-simple: app + database + HTTPS proxy in one command.
#
# On your server (after git clone):
#   cp .env.example .env    # edit DOMAIN and passwords
#   docker compose up -d --build
#
# Or run:  bash scripts/install-production.sh

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-afya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-afya}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-afya} -d ${POSTGRES_DB:-afya}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-afya}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-afya}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-afya}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-afya}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
